<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" role="img" aria-label="Auressa – elegante Duft-Findung">
  <defs>
    <linearGradient id="auressaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf6ee"/>
      <stop offset="0.55" stop-color="#efe2d0"/>
      <stop offset="1" stop-color="#e6d6bf"/>
    </linearGradient>
    <radialGradient id="auressaGlow" cx="0.5" cy="0.36" r="0.5">
      <stop offset="0" stop-color="#d8b277" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#d8b277" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="auressaCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8b277"/>
      <stop offset="1" stop-color="#b1894f"/>
    </linearGradient>
  </defs>

  <!-- warm cream-gold background, fully in Auressa tokens -->
  <rect width="600" height="440" fill="url(#auressaBg)"/>
  <circle cx="300" cy="158" r="150" fill="url(#auressaGlow)"/>
  <rect x="16" y="16" width="568" height="408" rx="22" fill="none" stroke="#b99863" stroke-opacity="0.5"/>

  <!-- decorative flacon (Auressa motif), warm brown outline + gold cap -->
  <g transform="translate(300 158)" fill="none" stroke="#6b4f30" stroke-opacity="0.85" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <rect x="-65" y="-30" width="130" height="170" rx="28"/>
    <rect x="-24" y="-62" width="48" height="34"/>
    <rect x="-32" y="-92" width="64" height="32" rx="8" fill="url(#auressaCap)" stroke="none"/>
    <rect x="-40" y="42" width="80" height="60" rx="8" stroke-opacity="0.45"/>
  </g>

  <!-- subtle gold sparkle -->
  <path d="M408 66 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" fill="#d8b277" opacity="0.9"/>

  <!-- brand wordmark + boutique kicker -->
  <text x="300" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#4b3528">Auressa</text>
  <text x="300" y="382" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="5" fill="#a07c43">DISCOVERY · FRAGRANCE · BOUTIQUE</text>
</svg>
